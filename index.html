<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Juego Cazando</title>

    <link rel="stylesheet" href="cazando.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <script src="utils.js"></script>
</head>

<body onload="iniciarJuego();">

<div class="contenedor">

    <header class="cabecera">
        <h1>🎯 Juego Cazando</h1>
        <p>Autor: <strong>Domenica Lincango</strong></p>
    </header>

    <div class="panel">

        <div class="tarjeta">
            <span class="titulo">⭐ Puntos</span>
            <span id="puntos">0</span>
        </div>

        <div class="tarjeta">
            <span class="titulo">⏱ Tiempo</span>
            <span id="tiempo">10</span>
        </div>

    </div>

    <div class="zonaJuego">
        <canvas id="areaJuego" width="500" height="500"></canvas>
    </div>

    <div class="controles">

        <button onclick="moverArriba()">▲</button>

        <div class="fila">
            <button onclick="moverIzquierda()">◀</button>
            <button onclick="moverAbajo()">▼</button>
            <button onclick="moverDerecha()">▶</button>
        </div>

        <button class="reiniciar" onclick="reiniciar()">
            🔄 Reiniciar
        </button>

    </div>

    <p id="mensaje"></p>

</div>

<script src="cazando.js"></script>

</body>
</html>
